apiVersion: apps/v1
kind: Deployment
metadata:
  name: java-app
  labels:
    app: java-app
spec:
  replicas: 2
  selector:
    matchLabels:
      app: java-app
  strategy:
    type: RollingUpdate
  template:
    metadata:
      labels:
        app: java-app
    spec:
      containers:
        - name: java-app
          image: enabdelhamed/simplejavaapp:4c9174308df78d868cd0e7a728424acba2fc87e7
          ports:
            - containerPort: 80
          imagePullPolicy: Always
