apiVersion: apps/v1
kind: Deployment
metadata:
  name: java-app
  labels:
    app: java-app
spec:
  replicas: 3
  selector:
    matchLabels:
      app: java-app
  strategy:
    type: RollingUpdate
  template:
    metadata:
      labels:
        app: java-app
    spec:
      containers:
        - name: java-app
          image: enabdelhamed/solarsystem:3349e045ef767440b43ac272222cd31aca89cf17
          ports:
            - containerPort: 80
          imagePullPolicy: Always
