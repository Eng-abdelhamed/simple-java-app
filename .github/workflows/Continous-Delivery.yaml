name: CD workflow
on:
 push:
    branches:
        - 'main'

env:
  AWS_ACCESS_KEY:  ${{secrets.AWS_ACCESS_KEY}}
  AWS_ACESS_KEY_ID: ${{secrets.AWS_ACESS_KEY_ID}}
  aws_region: "us-east-1"
  
permissions:
    contents: read
    packages: write

jobs:
    CD-Work:
      name: CDWorks
      runs-on: ubuntu-latest
      steps:
       - name: Chechkout Repo
         uses: actions/checkout@v5

       - name: Docker Logining
         uses: docker/login-action@v4
         with:
            username: ${{secrets.DOCKER_USERNAME}}
            password: ${{secrets.DOCKER_PASSWORD}}

       - name: GHCR Logining
         uses: docker/login-action@v4
         with:
            registry: ghcr.io
            username: ${{github.actor}}
            password: ${{secrets.GITHUB_TOKEN}}

       - name: Build The Image And Push it to DockerHub
         uses: docker/build-push-action@v7
         with:
            context: .
            push: true
            tags: |
                ${{secrets.DOCKER_USERNAME}}/simplejavaapp:${{github.sha}}
                ghcr.io/eng-abdelhamed/simplejavaapp:${{github.sha}}  

       - name: Replace Tokens
         uses: cschleiden/replace-tokens@v1
         with:
           tokenPrefix: '_{_'
           tokenSuffix: '_}_'
           files: '["k8s/deployment.yaml"]'
         env:
          IMAGE: ${{secrets.DOCKER_USERNAME}}/simplejavaapp:${{github.sha}}
          REPLICAS: ${{secrets.REPLICAS}}

       - name: AWS credentials
         uses: aws-actions/configure-aws-credentials@v1
         with:
          aws-access-key-id: ${{ env.AWS_ACCESS_KEY }}
          aws-secret-access-key: ${{ env.AWS_ACESS_KEY_ID }}
          aws-region: ${{ env.aws_region }}

       - name: K*S
         uses: azure/k8s-set-context@v5
         with:
         method: kubeconfig
           kubeconfig:  ${{ secrets.KUBECONFIG }}

       - name: Deploy To K8s
         run: |
            kubectl apply -f k8s/deployment.yaml
        

