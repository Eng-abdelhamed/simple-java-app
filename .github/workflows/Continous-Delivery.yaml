name: CD workflow
on:
 push:
    branches:
        - 'main'

permissions:
    contents: read
    packages: write

jobs:
    CD-Work:
      name: CDWorks
      runs-on: ubuntu-latest
      steps:
       - name: Chechkout Repo
         uses: actions/checkout@v5

        # Logging inside the Docker
        # build The Image
        # Push The Image to dockerHub or GHCR

       - name: Docker Logining
         uses: docker/login-action@v4
         with:
            username: ${{secrets.DOCKER_USERNAME}}
            password: ${{secrets.DOCKER_PASSWORD}}

       - name: GHCR Logining
         uses: docker/login-action@v4
         with:
            registry: ghcr.io
            username: ${{github.actor}}
            password: ${{secrets.GITHUB_TOKEN}}

       - name: Build The Image And Push it to DockerHub
         uses: docker/build-push-action@v7
         with:
            context: .
            push: true
            tags: |
                ${{secrets.DOCKER_USERNAME}}/simplejavaapp:${{github.sha}}
                ghcr.io/${{github.actor}}/simplejavaapp:${{github.sha}}  
